prose:
  rooturl: "content"
  media: "static/images"
  ignore:
    - "index.md"
    - "_index.md"
    - ".github"
    - "themes"
    - "public"
    - "docs"
  metadata:
    content/investigations:
      - name: "title"
        field:
          element: "text"
          label: "Title"
          placeholder: "Investigation title"
      - name: "created"
        field:
          element: "text"
          label: "Created Date"
          placeholder: "YYYY-MM-DD"
      - name: "status"
        field:
          element: "select"
          label: "Status"
          options:
            - name: "Seed"
              value: "Seed"
            - name: "Thinking"
              value: "Thinking"
            - name: "Reading"
              value: "Reading"
            - name: "Exploring"
              value: "Exploring"
            - name: "Model Emerging"
              value: "Model Emerging"
            - name: "Essay Draft"
              value: "Essay Draft"
            - name: "Stable"
              value: "Stable"
            - name: "Reopened"
              value: "Reopened"
            - name: "Archived"
              value: "Archived"
      - name: "areas"
        field:
          element: "multiselect"
          label: "Areas"
          placeholder: "Select primary area(s)"
          options:
            - name: "Philosophy"
              value: "Philosophy"
            - name: "Engineering"
              value: "Engineering"
            - name: "AI"
              value: "AI"
      - name: "topics"
        field:
          element: "multiselect"
          label: "Topics"
          alterable: true
          options:
            - name: "Complexity"
              value: "Complexity"
            - name: "Systems Thinking"
              value: "Systems Thinking"
            - name: "Emergence"
              value: "Emergence"
            - name: "Distributed Systems"
              value: "Distributed Systems"
            - name: "Design Patterns"
              value: "Design Patterns"
            - name: "Deep Learning"
              value: "Deep Learning"
            - name: "Scaling Laws"
              value: "Scaling Laws"
      - name: "questions"
        field:
          element: "textarea"
          label: "Questions (one per line)"
          placeholder: "What drives this investigation?"
      - name: "tags"
        field:
          element: "multiselect"
          label: "Tags"
          alterable: true
          options:
            - name: "complexity"
              value: "complexity"
            - name: "emergence"
              value: "emergence"
            - name: "systems"
              value: "systems"
            - name: "distributed"
              value: "distributed"
            - name: "patterns"
              value: "patterns"
            - name: "architecture"
              value: "architecture"
      - name: "draft"
        field:
          element: "checkbox"
          label: "Draft (hidden from listings)"
      - name: "related"
        field:
          element: "textarea"
          label: "Related (one slug per line, no .md)"
          placeholder: "distributed-systems"
