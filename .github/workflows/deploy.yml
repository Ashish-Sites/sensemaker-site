name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'static/**'
      - 'themes/**'
      - 'config.toml'
      - 'generate_status.py'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/build-validate.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Validate, build, and verify links
        run: pwsh -File ./scripts/build-with-validation.ps1 -BaseUrl "${{ steps.pages.outputs.base_url }}/" -OutputDir "public"

      - name: Verify build output directory
        run: |
          ls -la
          test -d public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
