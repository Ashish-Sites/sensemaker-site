name: Build and Validate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-validate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Run validations and build
        run: pwsh -File ./scripts/build-with-validation.ps1 -BaseUrl "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" -OutputDir "public"

      - name: Verify build output directory
        run: |
          ls -la
          test -d public
