name: Generate Status Pages

on:
  workflow_dispatch:  # Manual trigger only
  schedule:
    - cron: '0 0 * * 0'  # Optional: run weekly (Sunday 00:00 UTC)

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git operations

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-frontmatter networkx google-genai

      - name: Generate status report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_status.py --content-dir ./content --output-dir ./content/status

      - name: Commit and push (if changes)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if git diff --quiet content/status/; then
            echo "No changes detected"
          else
            git add content/status/
            git commit -m "chore: regenerate status report [skip ci]"
            git push
          fi
