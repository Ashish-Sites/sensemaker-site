<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="SenseMaker content demo image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <g fill="#e2e8f0" font-family="Segoe UI, sans-serif" text-anchor="middle">
    <text x="600" y="300" font-size="54" font-weight="700">SenseMaker Demo Image</text>
    <text x="600" y="345" font-size="24">Uploaded asset used inside markdown content pages</text>
  </g>
</svg>
