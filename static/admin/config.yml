backend:
  name: git-gateway
  repo: Ashish-Sites/sensemaker-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/41ccd919-1a48-48a6-a2e4-73d1e11a8a8c/pkce
  auth_token_endpoint: /sites/41ccd919-1a48-48a6-a2e4-73d1e11a8a8c/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

local_backend: true

media_folder: static/images/uploads
public_folder: /images/uploads

site_url: https://ashish-sites.github.io/sensemaker-site/
display_url: https://ashish-sites.github.io/sensemaker-site/
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

publish_mode: editorial_workflow

collections:
  - name: investigations
    label: Investigations
    label_singular: Investigation
    folder: content/investigations
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    nested:
      depth: 3
      summary: "{{title}}"
    summary: "{{title}} - {{status}}"
    sortable_fields: [created, title, status]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Created, name: created, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - label: Status
        name: status
        widget: select
        options:
          - Seed
          - Thinking
          - Reading
          - Exploring
          - Model Emerging
          - Essay Draft
          - Stable
          - Reopened
          - Archived
      - label: Areas
        name: areas
        widget: relation
        collection: areas_terms
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: true
      - label: Topics
        name: topics
        widget: relation
        collection: topics_terms
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: true
      - label: Questions
        name: questions
        widget: relation
        collection: questions_terms
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: true
      - label: Tags
        name: tags
        widget: relation
        collection: tags_terms
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: false
      - label: Related
        name: related
        widget: list
        required: false
        field: { label: Related Slug, name: related_slug, widget: string, hint: "Use filename slug only, no .md" }
      - label: Attached Article Slugs
        name: attached_articles
        widget: list
        required: false
        field: { label: Article Slug, name: article_slug, widget: string, hint: "Optional helper list; actual attachment is controlled on article via investigation slug" }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }

  - name: articles
    label: Articles
    label_singular: Article
    folder: content/articles
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} - {{article_type}}"
    sortable_fields: [created, title, article_type]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Created, name: created, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - label: Article Type
        name: article_type
        widget: select
        options:
          - idea
          - subsection
          - comment
        default: idea
      - { label: Investigation Slug, name: investigation, widget: string, hint: "Required. Use investigation filename slug, e.g. how-to-use-this-site" }
      - label: Tags
        name: tags
        widget: relation
        collection: tags_terms
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: false
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }

  - name: areas_terms
    label: Areas
    label_singular: Area
    folder: content/areas
    path: "{{slug}}/_index"
    create: true
    delete: true
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Area Title, name: title, widget: string, hint: "Used in investigations and taxonomy links" }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: topics_terms
    label: Topics
    label_singular: Topic
    folder: content/topics
    path: "{{slug}}/_index"
    create: true
    delete: true
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Topic Title, name: title, widget: string, hint: "Used in investigations and taxonomy links" }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: tags_terms
    label: Tags
    label_singular: Tag
    folder: content/tags
    path: "{{slug}}/_index"
    create: true
    delete: true
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Tag Title, name: title, widget: string, hint: "Used in investigations and taxonomy links" }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: questions_terms
    label: Questions
    label_singular: Question
    folder: content/questions
    path: "{{slug}}/_index"
    create: true
    delete: true
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Question Text, name: title, widget: string, hint: "Use full natural-language question" }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, required: false }
