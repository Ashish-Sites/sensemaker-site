backend:
  name: git-gateway
  repo: Ashish-Sites/sensemaker-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/41ccd919-1a48-48a6-a2e4-73d1e11a8a8c/pkce
  auth_token_endpoint: /sites/41ccd919-1a48-48a6-a2e4-73d1e11a8a8c/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

local_backend: true

media_folder: static/images/uploads
public_folder: /images/uploads

site_url: https://ashish-sites.github.io/sensemaker-site/
display_url: https://ashish-sites.github.io/sensemaker-site/
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

publish_mode: editorial_workflow

collections:
  - name: investigations
    label: Investigations
    label_singular: Investigation
    folder: content/investigations
    create: true
    delete: true
    exclude: ["_index.md", "**/_index.md"]
    filter:
      field: entry_type
      value: investigation
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} - {{status}}"
    sortable_fields: [created, title, status]
    fields:
      - { label: Entry Type, name: entry_type, widget: hidden, default: investigation }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false, hint: "Short summary for list pages (max 200 chars)", pattern: ["^.{0,200}$", "Description must be 200 characters or fewer"] }
      - { label: Created, name: created, widget: datetime, format: "YYYY-MM-DD", time_format: false, default: "{{now}}" }
      - label: Status
        name: status
        widget: select
        default: Seed
        options:
          - Seed
          - Thinking
          - Reading
          - Exploring
          - Model Emerging
          - Essay Draft
          - Stable
          - Reopened
          - Archived
      - label: Areas
        name: areas
        widget: relation
        collection: areas_terms
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: false
      - label: Topics
        name: topics
        widget: relation
        collection: topics_terms
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: false
      - label: Questions
        name: questions
        widget: relation
        collection: questions_terms
        filters:
          - field: lifecycle
            values: [active]
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: false
      - label: Tags
        name: tags
        widget: relation
        collection: tags_terms
        filters:
          - field: lifecycle
            values: [active]
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: false
      - label: Related
        name: related
        widget: relation
        collection: investigations
        search_fields: [title]
        display_fields: [title]
        value_field: "{{slug}}"
        multiple: true
        required: false
      - label: Attached Articles
        name: attached_articles
        widget: relation
        collection: articles
        filters:
          - field: lifecycle
            values: [active]
        search_fields: [title]
        display_fields: [title, article_type]
        value_field: "{{slug}}"
        multiple: true
        required: false
      - label: Content Blocks
        name: content_blocks
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.type}}"
        hint: "Optional drag-and-drop blocks. If empty, Body markdown is used."
        types:
          - label: Markdown
            name: markdown
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: markdown }
              - { label: Markdown, name: markdown, widget: markdown }
          - label: Code
            name: code
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: code }
              - { label: Language, name: language, widget: string, required: false, default: text }
              - { label: Code, name: code, widget: text }
          - label: Mermaid
            name: mermaid
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: mermaid }
              - { label: Diagram, name: diagram, widget: text, hint: "Mermaid definition (e.g. flowchart TD...)" }
          - label: Table
            name: table
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: table }
              - { label: Table Markdown, name: markdown, widget: text, hint: "Paste a Markdown table" }
          - label: Chart
            name: chart
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: chart }
              - { label: Chart Type, name: chart_type, widget: select, options: [line, bar], default: line }
              - { label: Series Label, name: series, widget: string, required: false, default: Series }
              - { label: Labels (pipe separated), name: labels, widget: string, hint: "Example: Jan|Feb|Mar" }
              - { label: Values (pipe separated), name: values, widget: string, hint: "Example: 10|20|15" }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body (Fallback Markdown), name: body, widget: markdown, hint: "Used when Content Blocks are empty; keeps legacy entries working." }

  - name: articles
    label: Articles
    label_singular: Article
    folder: content/articles
    create: true
    delete: true
    exclude: ["_index.md", "**/_index.md"]
    filter:
      field: entry_type
      value: article
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} - {{article_type}}"
    sortable_fields: [created, title, article_type]
    fields:
      - { label: Entry Type, name: entry_type, widget: hidden, default: article }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false, hint: "Short summary for list pages (max 200 chars)", pattern: ["^.{0,200}$", "Description must be 200 characters or fewer"] }
      - { label: Created, name: created, widget: datetime, format: "YYYY-MM-DD", time_format: false, default: "{{now}}" }
      - label: Article Type
        name: article_type
        widget: select
        options:
          - idea
          - sub-article
          - comment
          - evidence
          - summary
          - counterpoint
          - quote
          - definition
          - synthesis
        default: idea
      - label: Attached Investigations
        name: investigations
        widget: relation
        collection: investigations
        search_fields: [title]
        display_fields: [title]
        value_field: "{{slug}}"
        multiple: true
        required: false
      - { label: Legacy Single Investigation Slug, name: investigation, widget: string, required: false, hint: "Backward compatibility only. Prefer Attached Investigations." }
      - label: Tags
        name: tags
        widget: relation
        collection: tags_terms
        filters:
          - field: lifecycle
            values: [active]
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: true
        required: false
      - { label: Source Link, name: source_link, widget: string, required: false, hint: "Optional primary reference URL, especially for evidence or quote articles" }
      - { label: Confidence, name: confidence, widget: select, required: false, options: [low, medium, high], hint: "Optional confidence level for claims in this article" }
      - label: Canonical Investigation
        name: canonical_investigation
        widget: relation
        collection: investigations
        search_fields: [title]
        display_fields: [title]
        value_field: "{{slug}}"
        multiple: false
        required: false
        hint: "Optional primary home investigation when attached to multiple investigations"
      - label: Content Blocks
        name: content_blocks
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.type}}"
        hint: "Optional drag-and-drop blocks. If empty, Body markdown is used."
        types:
          - label: Markdown
            name: markdown
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: markdown }
              - { label: Markdown, name: markdown, widget: markdown }
          - label: Code
            name: code
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: code }
              - { label: Language, name: language, widget: string, required: false, default: text }
              - { label: Code, name: code, widget: text }
          - label: Mermaid
            name: mermaid
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: mermaid }
              - { label: Diagram, name: diagram, widget: text, hint: "Mermaid definition (e.g. flowchart TD...)" }
          - label: Table
            name: table
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: table }
              - { label: Table Markdown, name: markdown, widget: text, hint: "Paste a Markdown table" }
          - label: Chart
            name: chart
            widget: object
            fields:
              - { label: Block Type, name: type, widget: hidden, default: chart }
              - { label: Chart Type, name: chart_type, widget: select, options: [line, bar], default: line }
              - { label: Series Label, name: series, widget: string, required: false, default: Series }
              - { label: Labels (pipe separated), name: labels, widget: string, hint: "Example: Jan|Feb|Mar" }
              - { label: Values (pipe separated), name: values, widget: string, hint: "Example: 10|20|15" }
      - { label: Lifecycle, name: lifecycle, widget: select, options: [active, archived], default: active }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body (Fallback Markdown), name: body, widget: markdown, hint: "Used when Content Blocks are empty; keeps legacy entries working." }

  - name: areas_terms
    label: Areas
    label_singular: Area
    folder: content/areas
    create: true
    delete: true
    exclude: ["_index.md", "**/_index.md"]
    filter:
      field: entry_type
      value: area_term
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Entry Type, name: entry_type, widget: hidden, default: area_term }
      - { label: Area Title, name: title, widget: string, hint: "Used in investigations and taxonomy links" }
      - { label: Description, name: description, widget: string, required: false, hint: "Short summary for list pages (max 200 chars)", pattern: ["^.{0,200}$", "Description must be 200 characters or fewer"] }
      - { label: Lifecycle, name: lifecycle, widget: select, options: [active, archived], default: active }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: topics_terms
    label: Topics
    label_singular: Topic
    folder: content/topics
    create: true
    delete: true
    exclude: ["_index.md", "**/_index.md"]
    filter:
      field: entry_type
      value: topic_term
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Entry Type, name: entry_type, widget: hidden, default: topic_term }
      - { label: Topic Title, name: title, widget: string, hint: "Used in investigations and taxonomy links" }
      - { label: Description, name: description, widget: string, required: false, hint: "Short summary for list pages (max 200 chars)", pattern: ["^.{0,200}$", "Description must be 200 characters or fewer"] }
      - label: Primary Area
        name: primary_area
        widget: relation
        collection: areas_terms
        filters:
          - field: lifecycle
            values: [active]
        search_fields: [title]
        display_fields: [title]
        value_field: title
        multiple: false
        required: false
        hint: "Optional conceptual parent area for this topic"
      - { label: Lifecycle, name: lifecycle, widget: select, options: [active, archived], default: active }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: tags_terms
    label: Tags
    label_singular: Tag
    folder: content/tags
    create: true
    delete: true
    exclude: ["_index.md", "**/_index.md"]
    filter:
      field: entry_type
      value: tag_term
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Entry Type, name: entry_type, widget: hidden, default: tag_term }
      - { label: Tag Title, name: title, widget: string, hint: "Used in investigations and taxonomy links" }
      - { label: Description, name: description, widget: string, required: false, hint: "Short summary for list pages (max 200 chars)", pattern: ["^.{0,200}$", "Description must be 200 characters or fewer"] }
      - { label: Lifecycle, name: lifecycle, widget: select, options: [active, archived], default: active }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: questions_terms
    label: Questions
    label_singular: Question
    folder: content/questions
    create: true
    delete: true
    exclude: ["_index.md", "**/_index.md"]
    filter:
      field: entry_type
      value: question_term
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Entry Type, name: entry_type, widget: hidden, default: question_term }
      - { label: Question Text, name: title, widget: string, hint: "Use full natural-language question" }
      - { label: Description, name: description, widget: string, required: false, hint: "Short summary for list pages (max 200 chars)", pattern: ["^.{0,200}$", "Description must be 200 characters or fewer"] }
      - { label: Lifecycle, name: lifecycle, widget: select, options: [active, archived], default: active }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown, required: false }
