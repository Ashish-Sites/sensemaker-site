backend:
  name: git-gateway
  repo: Ashish-Sites/sensemaker-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/41ccd919-1a48-48a6-a2e4-73d1e11a8a8c/pkce
  auth_token_endpoint: /sites/41ccd919-1a48-48a6-a2e4-73d1e11a8a8c/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

local_backend: true

media_folder: static/images/uploads
public_folder: /images/uploads

site_url: https://ashish-sites.github.io/sensemaker-site/
display_url: https://ashish-sites.github.io/sensemaker-site/
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

publish_mode: editorial_workflow

collections:
  - name: investigations
    label: Investigations
    label_singular: Investigation
    folder: content/investigations
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    nested:
      depth: 3
      summary: "{{title}}"
    summary: "{{title}} - {{status}}"
    sortable_fields: [created, title, status]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Created, name: created, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - label: Status
        name: status
        widget: select
        options:
          - Seed
          - Thinking
          - Reading
          - Exploring
          - Model Emerging
          - Essay Draft
          - Stable
          - Reopened
          - Archived
      - label: Areas
        name: areas
        widget: list
        min: 1
        field: { label: Area, name: area, widget: string }
      - label: Topics
        name: topics
        widget: list
        min: 1
        field: { label: Topic, name: topic, widget: string }
      - label: Questions
        name: questions
        widget: list
        min: 1
        field: { label: Question, name: question, widget: string }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - label: Related
        name: related
        widget: list
        required: false
        field: { label: Related Slug, name: related_slug, widget: string, hint: "Use filename slug only, no .md" }
      - label: Attached Article Slugs
        name: attached_articles
        widget: list
        required: false
        field: { label: Article Slug, name: article_slug, widget: string, hint: "Optional helper list; actual attachment is controlled on article via investigation slug" }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }

  - name: articles
    label: Articles
    label_singular: Article
    folder: content/articles
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} - {{article_type}}"
    sortable_fields: [created, title, article_type]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Created, name: created, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - label: Article Type
        name: article_type
        widget: select
        options:
          - idea
          - subsection
          - comment
        default: idea
      - { label: Investigation Slug, name: investigation, widget: string, hint: "Required. Use investigation filename slug, e.g. how-to-use-this-site" }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }
