{{ define "content" }}
<div class="taxonomy-page">
  <h1>{{ .Title }}</h1>
  {{ if .Content }}
    <div class="prose taxonomy-intro">{{ .Content }}</div>
  {{ else }}
    <p class="subtitle">Browse all {{ .Data.Plural }}</p>
  {{ end }}
  
  {{ if .Data.Terms }}
    <div class="pages-grid">
      {{ range .Data.Terms.ByCount }}
        <div class="investigation-card">
          <div class="card-header">
            <span class="updated">{{ .Count }} investigations</span>
          </div>
          
          <h2 class="card-title">
            <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a>
          </h2>

          <a href="{{ .Page.RelPermalink }}" class="card-link">Open term →</a>
        </div>
      {{ end }}
    </div>
  {{ else }}
    <p class="empty-state">No terms found.</p>
  {{ end }}
</div>
{{ end }}
