<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} · {{ .Site.Title }}</title>
  <meta name="description" content="{{ .Description | default .Site.Params.description }}">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/print.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <h1 class="logo"><a href="/">{{ .Site.Title }}</a></h1>
        <nav class="nav">
          {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="nav-link {{ if $current := $.RelPermalink }}{{ if eq $current .URL }}active{{ end }}{{ end }}">
              {{ .Name }}
            </a>
          {{ end }}
          <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
        </nav>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      {{ block "content" . }}{{ end }}
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>{{ .Site.Params.footer }}</p>
    </div>
  </footer>

  <script src="/js/theme-toggle.js"></script>
  <script src="/js/katex-setup.js"></script>
  {{ if or (hasPrefix .RelPermalink "/investigations/") (hasPrefix .RelPermalink "/search") }}
    <script src="/js/search.js"></script>
  {{ end }}
</body>
</html>
