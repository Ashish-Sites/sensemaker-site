<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>{{ .Title }} · {{ .Site.Title }}</title>
  <meta name="description" content="{{ .Description | default .Site.Params.description }}">
  <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
  <link rel="stylesheet" href="{{ "css/print.css" | absURL }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <h1 class="logo"><a href="{{ "" | absURL }}">{{ .Site.Title }}</a></h1>
        <nav class="nav" aria-label="Primary">
          <details class="nav-group">
            <summary class="nav-group-trigger">Investigate</summary>
            <div class="nav-dropdown">
              <a href="{{ "investigations/" | absURL }}" class="nav-link {{ if hasPrefix $.RelPermalink "/investigations/" }}active{{ end }}">Investigations</a>
              <a href="{{ "articles/" | absURL }}" class="nav-link {{ if hasPrefix $.RelPermalink "/articles/" }}active{{ end }}">Articles</a>
              <a href="{{ "scratchpads/" | absURL }}" class="nav-link {{ if hasPrefix $.RelPermalink "/scratchpads/" }}active{{ end }}">Scratchpads</a>
            </div>
          </details>

          <details class="nav-group">
            <summary class="nav-group-trigger">Map</summary>
            <div class="nav-dropdown">
              <a href="{{ "areas/" | absURL }}" class="nav-link {{ if hasPrefix $.RelPermalink "/areas/" }}active{{ end }}">Areas</a>
              <a href="{{ "topics/" | absURL }}" class="nav-link {{ if hasPrefix $.RelPermalink "/topics/" }}active{{ end }}">Topics</a>
              <a href="{{ "tags/" | absURL }}" class="nav-link {{ if hasPrefix $.RelPermalink "/tags/" }}active{{ end }}">Tags</a>
              <a href="{{ "questions/" | absURL }}" class="nav-link {{ if hasPrefix $.RelPermalink "/questions/" }}active{{ end }}">Questions</a>
            </div>
          </details>

          <details class="nav-group">
            <summary class="nav-group-trigger">Manage</summary>
            <div class="nav-dropdown">
              <a href="{{ "admin/" | absURL }}" class="nav-link" target="_blank" rel="noopener noreferrer">Admin</a>
              <a href="https://github.com/Ashish-Sites/sensemaker-site/actions/workflows/deploy.yml" class="nav-link" target="_blank" rel="noopener noreferrer">Publish</a>
              <a href="{{ "status/" | absURL }}" class="nav-link {{ if hasPrefix $.RelPermalink "/status/" }}active{{ end }}">Status</a>
            </div>
          </details>

          <a href="{{ "links/" | absURL }}" class="nav-link nav-link-strong {{ if hasPrefix $.RelPermalink "/links/" }}active{{ end }}">Links</a>
          <a href="{{ "search/" | absURL }}" class="nav-link nav-link-strong {{ if hasPrefix $.RelPermalink "/search/" }}active{{ end }}">Search</a>
          <a href="{{ "help/" | absURL }}" class="nav-link nav-link-strong {{ if hasPrefix $.RelPermalink "/help/" }}active{{ end }}">Help</a>
          <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
        </nav>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container {{ if eq .Type "help" }}container-help{{ end }}">
      {{ block "content" . }}{{ end }}
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>{{ .Site.Params.footer }} · Last deployed: {{ now.Format "02 January 2006 03:04:05 PM" }}</p>
    </div>
  </footer>

  <script src="{{ "js/theme-toggle.js" | absURL }}"></script>
  <script src="{{ "js/katex-setup.js" | absURL }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="{{ "js/mermaid-setup.js" | absURL }}"></script>
  <script src="{{ "js/chart-setup.js" | absURL }}"></script>
  <script>
    (function () {
      const navGroups = Array.from(document.querySelectorAll('.nav .nav-group'));
      if (!navGroups.length) return;

      navGroups.forEach((group) => {
        group.addEventListener('toggle', () => {
          if (!group.open) return;
          navGroups.forEach((other) => {
            if (other !== group) other.removeAttribute('open');
          });
        });
      });

      document.addEventListener('click', (event) => {
        if (navGroups.some((group) => group.contains(event.target))) return;
        navGroups.forEach((group) => group.removeAttribute('open'));
      });

      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Escape') return;
        navGroups.forEach((group) => group.removeAttribute('open'));
      });
    })();
  </script>
</body>
</html>
