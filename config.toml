baseURL = "/"
locale = "en-us"
title = "SenseMaker"
theme = "sensemaker"
pluralizeListTitles = false
removePathAccents = true

[frontmatter]
  date = ["date", "created", ":default"]
  lastmod = ["lastmod", "updated", "date", "created", ":fileModTime", ":default"]

# Output formats
[outputs]
  home = ["HTML", "JSON"]

# Taxonomies - Core organization
[taxonomies]
  area = "areas"
  topic = "topics"
  tag = "tags"
  question = "questions"

# Menu navigation
[[menu.main]]
  name = "Investigations"
  url = "/investigations/"
  weight = 1

[[menu.main]]
  name = "Areas"
  url = "/areas/"
  weight = 2

[[menu.main]]
  name = "Topics"
  url = "/topics/"
  weight = 3

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 4

[[menu.main]]
  name = "Questions"
  url = "/questions/"
  weight = 5

[[menu.main]]
  name = "Articles"
  url = "/articles/"
  weight = 6

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 7

[[menu.main]]
  name = "Status"
  url = "/status/"
  weight = 8

# Markdown rendering
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "native"

# Site parameters
[params]
  favicon = "/images/favicon.svg"
  author = "Ashish Sinha"
  description = "A digital thinking environment for long-term sense-making"
  
  # Dark mode toggle
  darkMode = true
  
  # Search configuration
  search = true
  
  # Footer
  footer = "SenseMaker MVP1 · Digital Extension of Thinking"
